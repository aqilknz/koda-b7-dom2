<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitask 3 - Pokemon List</title>
    <style>
        :root {
            --primary-color: #ef5350;
            --bg-color: white;
        }
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #pokemon-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);  
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            border-radius: 12px;
            
            padding: 20px;
            text-align: center;
            background-color: beige;
        }
        .card:hover {
            border: 2px solid pink;
        }
        .card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .card h3 {
            text-transform: capitalize;
            margin: 15px 0 10px;
            font-size: 1.2rem;
            color: #333;
        }

        .type-badge {
            background-color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 3px;
            display: inline-block;
            text-transform: uppercase;
            font-weight: bold;
            color: grey;
        }
    </style>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Pokemon List</h1>
    <div id="pokemon-container">
        </div>
</body>
</html>
